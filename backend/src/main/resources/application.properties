spring.application.name=timekeeping-api
server.port=5000

# -- PostgreSQL ----------------------------------------------------------
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/timekeeping}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# -- JPA / Hibernate -----------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# -- Flyway --------------------------------------------------------------
spring.flyway.enabled=false

# -- JWT (REQUIRED: Must be set via JWT_SECRET environment variable) -----------
jwt.secret=${JWT_SECRET:timekeeping-dev-secret-key-replace-this-in-production-min-64-chars!}
jwt.expiration=${JWT_EXPIRATION:2592000000}

# -- Virtual Threads (Java 21+) -----------------------------------------
spring.threads.virtual.enabled=true

# -- Actuator ------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# -- CORS ----------------------------------------------------------------
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# -- Logging -------------------------------------------------------------
logging.level.root=INFO
logging.level.com.timekeeping=DEBUG
server.error.include-message=always
server.error.include-binding-errors=always
