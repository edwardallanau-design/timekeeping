spring.application.name=timekeeping-api
server.port=5000

# PostgreSQL Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/timekeeping}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT Configuration
jwt.secret=${JWT_SECRET:hKb9mL3nQpRsT8uVwXyZ2aB5cD7eF0gH1iJ3kL5mN7oP9qR1sT3uV5wX7yZ9aB2cD4eF6gH8iJ0kL2mN4oP6qR8sT0uV2wX4yZ6aB8cD0eF2gH4}
jwt.expiration=${JWT_EXPIRATION:2592000000}

# Virtual Threads (Java 21+)
spring.threads.virtual.enabled=true

# Server Configuration
logging.level.root=INFO
logging.level.com.timekeeping=DEBUG

# CORS
server.error.include-message=always
server.error.include-binding-errors=always
