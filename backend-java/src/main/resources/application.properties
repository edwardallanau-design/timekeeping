spring.application.name=timekeeping-api
server.port=5000

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/timekeeping}

# JWT Configuration
jwt.secret=${JWT_SECRET:your-super-secret-key-change-this-in-production}
jwt.expiration=${JWT_EXPIRATION:2592000000}

# Server Configuration
logging.level.root=INFO
logging.level.com.timekeeping=DEBUG

# CORS
server.error.include-message=always
server.error.include-binding-errors=always
