services:

  # ── PostgreSQL database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       timekeeping
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d timekeeping"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Spring Boot backend ─────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL:          jdbc:postgresql://postgres:5432/timekeeping
      DATABASE_USERNAME:     ${DB_USER:-postgres}
      DATABASE_PASSWORD:     ${DB_PASSWORD:-postgres}
      JWT_SECRET:            ${JWT_SECRET:?JWT_SECRET environment variable is required}
      JWT_EXPIRATION:        ${JWT_EXPIRATION:-2592000000}
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy

  # ── React frontend (nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
